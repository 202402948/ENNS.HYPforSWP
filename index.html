<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠를 위한 글로벌 IT & 경제 실시간 대시보드</title>
    <style>
        /* 테마 변수 설정 */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333333;
            --card-bg: #ffffff;
            --border-color: #dddddd;
            --accent-color: #e74c3c;
            --btn-hover-bg: #f0f0f0;
        }
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f4f7f6;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --btn-hover-bg: #2a2a2a;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* 뉴스 전광판 */
        .news-ticker {
            background-color: var(--card-bg);
            padding: 10px 0;
            border-bottom: 2px solid var(--border-color);
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            z-index: 10;
        }
        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 80s linear infinite;
            font-weight: bold;
        }
        .ticker-content span {
            margin-right: 50px;
        }
        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* 메인 레이아웃 */
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; position: relative; z-index: 10; }
        .header { text-align: center; margin-bottom: 20px; }
        #current-time { font-size: 0.9em; color: #888; }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        /* 2단 분리 대시보드 레이아웃 */
        .dashboard-layout { display: flex; gap: 20px; align-items: flex-start; }
        .stock-sidebar { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 10px; border: 1px solid var(--border-color);
            background-color: var(--bg-color); color: var(--text-color);
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .tab-btn.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }
        .stock-list-container {
            max-height: 650px; overflow-y: auto; padding-right: 5px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .stock-list-container::-webkit-scrollbar { width: 6px; }
        .stock-list-container::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }
        .stock-item {
            position: relative; cursor: pointer; border: 3px solid transparent;
            border-radius: 8px; transition: border-color 0.2s; background: var(--bg-color);
        }
        .stock-item.active { border-color: var(--accent-color); box-shadow: 0 0 10px rgba(231, 76, 60, 0.3); }
        .stock-item-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        .main-chart-area { flex-grow: 1; min-width: 0; display: flex; flex-direction: column; }
        .chart-header h2 { margin: 0 0 15px 0; }
        #chart-container { height: 500px; width: 100%; margin-bottom: 20px; }
        
        .company-news-area { padding-top: 15px; border-top: 2px dashed var(--border-color); }
        .company-news-area h3 { margin-top: 0; color: var(--accent-color); }
        .company-news-list { list-style: none; padding: 0; margin: 0; }
        .company-news-list li { padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .company-news-list li:last-child { border-bottom: none; }
        .company-news-list a { text-decoration: none; color: var(--text-color); font-size: 1.05em; font-weight: bold; }
        .company-news-list a:hover { color: var(--accent-color); }

        @media (max-width: 900px) {
            .dashboard-layout { flex-direction: column; }
            .stock-sidebar { width: 100%; }
            .stock-list-container { flex-direction: row; overflow-x: auto; max-height: 140px; padding-bottom: 10px; }
            .stock-item { min-width: 250px; }
        }

        #global-news-list { list-style: none; padding: 0; margin: 0; }
        #global-news-list li { padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        #global-news-list a { text-decoration: none; color: var(--text-color); font-size: 1.1em; }
        #global-news-list a:hover { color: var(--accent-color); }
        
        .load-more-btn {
            display: block; width: 100%; padding: 12px; margin-top: 15px;
            background-color: transparent; border: 2px solid var(--border-color);
            color: var(--text-color); font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: 0.2s; text-align: center;
        }
        .load-more-btn:hover { background-color: var(--btn-hover-bg); color: var(--accent-color); border-color: var(--accent-color); }

        /* 명언 & 생일 섹션 스타일 */
        .quote-card {
            background: linear-gradient(135deg, #f6f8f9 0%, #e5ebee 100%);
            border: 1px solid #dce1e4;
            text-align: center;
            padding: 40px 20px;
            margin-top: 30px;
            transition: all 0.5s ease;
        }
        body.dark-mode .quote-card {
            background: linear-gradient(135deg, #1e2326 0%, #2a3035 100%);
            border-color: #3a4146;
        }
        
        .quote-card.birthday-mode {
            background: linear-gradient(135deg, #fff0f0 0%, #ffe0e0 100%);
            border-color: #ffcccc;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.2);
        }
        body.dark-mode .quote-card.birthday-mode {
            background: linear-gradient(135deg, #3a1c1c 0%, #2a1010 100%);
            border-color: #5a2c2c;
        }

        .quote-card.birthday-mode .quote-text,
        .quote-card.birthday-mode .quote-author { color: #d81b60; }
        body.dark-mode .quote-card.birthday-mode .quote-text,
        body.dark-mode .quote-card.birthday-mode .quote-author { color: #ffb6b9; }

        .quote-text {
            font-size: 1.3em; font-style: normal; color: var(--text-color);
            margin-bottom: 15px; line-height: 1.6; transition: all 0.3s;
        }
        .quote-author {
            font-size: 1.1em; color: #7f8c8d; font-weight: bold; transition: all 0.3s;
        }
        body.dark-mode .quote-author { color: #aab7b8; }

        /* 하트 애니메이션 */
        .heart-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; overflow: hidden; display: none;
        }
        .floating-heart {
            position: absolute; bottom: -10vh; color: rgba(255, 182, 193, 0.7);
            font-size: 2rem; animation: floatUp ease-in forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        /* 플로팅 UI */
        .exchange-wrapper {
            position: fixed; right: 20px; top: 80px; z-index: 1000;
            display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
        }
        #toggle-exchange-btn {
            background-color: var(--card-bg); color: var(--text-color);
            border: 1px solid var(--border-color); padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s;
        }
        #toggle-exchange-btn:hover { background-color: var(--btn-hover-bg); }
        .floating-exchange {
            width: 250px; background: var(--card-bg); padding: 10px;
            border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color); transition: opacity 0.3s, transform 0.3s;
        }
        .floating-exchange.hidden { opacity: 0; pointer-events: none; transform: translateY(-10px); }
        @media (max-width: 1100px) { .exchange-wrapper { display: none; } }

        .floating-controls {
            position: fixed; right: 20px; bottom: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .action-btn {
            background-color: var(--text-color); color: var(--bg-color);
            border: none; padding: 15px; border-radius: 50%;
            cursor: pointer; font-size: 1.2em; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="heart-container" class="heart-container"></div>

    <div class="news-ticker">
        <div class="ticker-content" id="ticker-text">
            <span>최신 경제 뉴스를 실시간으로 수집하고 있습니다...</span>
        </div>
    </div>

    <div class="exchange-wrapper">
        <button id="toggle-exchange-btn">💱 환율창 숨기기</button>
        <div class="floating-exchange" id="exchange-container"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>아빠를 위한 글로벌 IT 대장주 & 경제 대시보드</h1>
            <p id="current-time">대한민국 표준시 로딩 중...</p>
        </div>

        <div class="card">
            <div class="dashboard-layout">
                <div class="stock-sidebar">
                    <div class="sidebar-tabs">
                        <button id="tab-it" class="tab-btn active" onclick="switchTab('it')">💻 IT 대장주</button>
                        <button id="tab-trend" class="tab-btn" onclick="switchTab('trend')">🔥 요즘 뜨는 기업</button>
                    </div>
                    <div class="stock-list-container" id="stock-list"></div>
                </div>

                <div class="main-chart-area">
                    <div class="chart-header">
                        <h2 id="chart-main-title">📊 실시간 증시 현황</h2>
                    </div>
                    <div id="chart-container"></div>
                    
                    <div class="company-news-area">
                        <h3 id="company-news-title">📰 기업 관련 뉴스</h3>
                        <ul class="company-news-list" id="company-news-list">
                            <li>종목을 선택하면 관련 뉴스가 표시됩니다.</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">📰 글로벌 경제 시황 타임라인</h2>
            <ul id="global-news-list">
                <li>뉴스를 실시간으로 분석 중입니다...</li>
            </ul>
            <button class="load-more-btn" id="load-more-news-btn" style="display: none;">📰 더 많은 경제 뉴스 펼쳐보기</button>
        </div>

        <div class="card quote-card" id="quote-card-container">
            <div class="quote-text" id="daily-quote-text">명언을 불러오는 중입니다...</div>
            <div class="quote-author" id="daily-quote-author"></div>
        </div>
        
    </div>

    <div class="floating-controls">
        <button class="action-btn" id="theme-btn" title="다크 모드 전환">🌙</button>
        <button class="action-btn" id="refresh-btn" title="데이터 새로고침">🔄</button>
    </div>

    <script>
        let isDarkMode = false;
        let isExchangeVisible = true;
        let currentTab = 'it'; 
        
        let allGlobalNews = [];
        let currentlyDisplayedGlobalNews = 5;

        const itStocks = [
            { symbol: 'NASDAQ:NVDA', name: '엔비디아', keyword: '엔비디아' },
            { symbol: 'NASDAQ:TSLA', name: '테슬라', keyword: '테슬라' },
            { symbol: 'NASDAQ:AAPL', name: '애플', keyword: '애플' },
            { symbol: 'NASDAQ:MSFT', name: '마이크로소프트', keyword: '마이크로소프트' },
            { symbol: 'NASDAQ:GOOGL', name: '구글', keyword: '구글' },
            { symbol: 'NASDAQ:AMZN', name: '아마존', keyword: '아마존' },
            { symbol: 'NASDAQ:META', name: '메타', keyword: '메타' },
            { symbol: 'NYSE:TSM', name: 'TSMC', keyword: 'TSMC' },
            { symbol: 'NASDAQ:AVGO', name: '브로드컴', keyword: '브로드컴' },
            { symbol: 'NASDAQ:ASML', name: 'ASML', keyword: 'ASML' },
            { symbol: 'NASDAQ:AMD', name: 'AMD', keyword: 'AMD' }
        ];

        const trendStocks = [
            { symbol: 'NASDAQ:PLTR', name: '팔란티어', keyword: '팔란티어' },
            { symbol: 'NASDAQ:RKLB', name: '로켓랩', keyword: '로켓랩' },
            { symbol: 'NASDAQ:ARM', name: 'ARM 홀딩스', keyword: 'ARM 홀딩스' },
            { symbol: 'NASDAQ:MSTR', name: '마이크로스트레티지', keyword: '마이크로스트레티지' },
            { symbol: 'NASDAQ:SMCI', name: '슈퍼마이크로', keyword: '슈퍼마이크로컴퓨터' },
            { symbol: 'NASDAQ:CRWD', name: '크라우드스트라이크', keyword: '크라우드스트라이크' },
            { symbol: 'NYSE:LLY', name: '일라이릴리', keyword: '일라이릴리' }
        ];

        let currentActiveStock = itStocks[0];

        const fatherQuotes = [
            { text: "나이를 먹는다는 것은 등산을 하는 것과 같다. 오를수록 숨은 차지만, 시야는 점점 넓어진다.", author: "잉그마르 베르히만" },
            { text: "청춘은 나이가 아니라 마음의 상태에 있다. 당신의 가장 눈부신 시절은 아직 오지 않았다.", author: "사무엘 울만" },
            { text: "은퇴는 마침표가 아니라, 당신이 진정 원했던 삶을 향해 긋는 새로운 밑줄입니다.", author: "리처드 라이더" },
            { text: "무언가를 시작하기에 너무 늦은 나이란 결코 없다. 오늘이 당신의 남은 인생 중 가장 젊은 날이다.", author: "C.S. 루이스" },
            { text: "인생의 전반전이 성공을 쫓는 시간이었다면, 후반전은 의미를 찾아가는 아름다운 여정이다.", author: "칼 융" },
            { text: "가장 훌륭한 일은 아직 시작되지 않았다. 최고의 날들은 아직 살아보지 않은 날들이다.", author: "토마스 머튼" },
            { text: "나무는 겨울에 자라지 않는 것처럼 보이지만, 사실은 다가올 봄을 위해 가장 깊고 단단한 뿌리를 내리고 있습니다.", author: "작자 미상" },
            { text: "성공이란 늙어가는 것을 두려워하지 않고, 매 순간을 자신의 속도에 맞춰 당당하게 걸어가는 것이다.", author: "알베르 카뮈" },
            { text: "당신이 지금까지 살아온 모든 순간이, 앞으로 살아갈 날들을 위한 가장 완벽한 준비 운동이었습니다.", author: "작자 미상" },
            { text: "인생의 2막은 지금까지 쌓아온 지혜와 여유를 마음껏 펼칠 수 있는 진정한 황금기입니다.", author: "작자 미상" },
            { text: "아름다운 노후는 그동안 흘린 땀방울이 만들어낸 가장 값진 훈장입니다.", author: "작자 미상" },
            { text: "당신의 50대는 지난 세월의 지혜와 다가올 시간의 여유가 만나는 아름다운 교차로입니다.", author: "작자 미상" },
            { text: "진정한 여행은 새로운 풍경을 보는 것이 아니라, 새로운 눈을 가지는 데 있다.", author: "마르셀 프루스트" },
            { text: "행복은 산꼭대기에 있는 것이 아니라, 산을 오르는 과정 곳곳에 피어 있습니다.", author: "작자 미상" },
            { text: "가장 깊은 밤에 가장 빛나는 별이 뜹니다. 아버지의 인생 2막은 그 어느 때보다 빛날 것입니다.", author: "작자 미상" },
            { text: "나이는 숫자에 불과하다. 중요한 것은 당신이 품고 있는 꿈과 열정의 크기이다.", author: "작자 미상" },
            { text: "때로는 속도를 늦추고 주변의 풍경을 감상하는 것이, 더 멀리 가는 가장 좋은 방법입니다.", author: "작자 미상" },
            { text: "가장 위대한 유산은 재물이 아니라, 아버지가 보여주신 묵묵한 성실함과 따뜻한 사랑입니다.", author: "작자 미상" },
            { text: "지금까지는 가족을 위해 달렸다면, 이제는 온전히 아버지만을 위한 왈츠를 추실 시간입니다.", author: "작자 미상" },
            { text: "오랜 세월 비바람을 견뎌낸 거목만이 가장 시원한 그늘을 만들어 줍니다. 감사합니다.", author: "작자 미상" },
            { text: "새로운 시작을 두려워하지 마세요. 당신의 경험이라는 나침반이 가장 정확한 길을 안내할 것입니다.", author: "작자 미상" },
            { text: "인생은 속도가 아니라 방향입니다. 이제는 마음이 이끄는 방향으로 걸어가세요.", author: "괴테" },
            { text: "수십 년의 성실함으로 지어 올린 당신의 인생은 그 어떤 빌딩보다 견고하고 아름답습니다.", author: "작자 미상" },
            { text: "은퇴는 직업에서 물러나는 것이 아니라, 진정한 나 자신으로 나아가는 위대한 첫걸음입니다.", author: "작자 미상" },
            { text: "매일 아침 눈을 뜨는 것이 기대되는 삶, 그것이 당신이 맞이할 인생의 두 번째 봄입니다.", author: "작자 미상" },
            { text: "과거를 자랑스러워하고, 현재를 즐기며, 미래를 기대하십시오. 당신은 충분히 그럴 자격이 있습니다.", author: "작자 미상" },
            { text: "인생의 해질녘이 일출보다 아름다운 이유는, 하루 종일 품었던 따뜻한 온기를 머금고 있기 때문입니다.", author: "작자 미상" },
            { text: "어떤 길을 가더라도 당신의 발걸음에는 지혜가 묻어날 것입니다. 자신을 믿고 나아가세요.", author: "작자 미상" },
            { text: "가장 평범한 일상이 가장 위대한 행복임을 아는 나이, 지금이 바로 당신의 황금기입니다.", author: "작자 미상" },
            { text: "수많은 위기를 묵묵히 이겨낸 당신의 굳은살 배인 손을 존경합니다. 이제는 여유를 쥐어보세요.", author: "작자 미상" },
            { text: "당신의 존재 자체가 우리 가족의 가장 큰 축복이자 자랑입니다. 앞으로의 매일이 축제이길 바랍니다.", author: "가족 일동" }
        ];

        // 🌟 2026년 ~ 2056년 (총 31년 치) 아버님 음력 1월 28일 완벽 변환표 🌟
        const lunarBirthdayToSolar = {
            2026: "03-16", 2027: "03-05", 2028: "02-22", 2029: "03-12", 2030: "03-02",
            2031: "02-19", 2032: "03-09", 2033: "02-27", 2034: "03-18", 2035: "03-07",
            2036: "02-24", 2037: "03-14", 2038: "03-03", 2039: "02-20", 2040: "03-10",
            2041: "02-28", 2042: "02-18", 2043: "03-09", 2044: "02-26", 2045: "03-16",
            2046: "03-05", 2047: "02-22", 2048: "03-12", 2049: "03-01", 2050: "02-19",
            2051: "03-10", 2052: "02-28", 2053: "03-18", 2054: "03-07", 2055: "02-24",
            2056: "03-13"
        };

        function startHeartAnimation() {
            const container = document.getElementById('heart-container');
            container.style.display = 'block'; 
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerText = '♥'; 
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 4 + 's';
                heart.style.fontSize = Math.random() * 1.5 + 1 + 'rem';
                container.appendChild(heart);
                
                setTimeout(() => { heart.remove(); }, 7000); 
            }, 400); 
        }

        function displayDailyQuote() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            const todayStr = `${month}-${day}`;

            const quoteCard = document.getElementById('quote-card-container');
            const textEl = document.getElementById('daily-quote-text');
            const authorEl = document.getElementById('daily-quote-author');

            if (lunarBirthdayToSolar[year] === todayStr) {
                quoteCard.classList.add('birthday-mode');
                textEl.innerHTML = "🎉 아빠 생신 축하해요!! 즐겁고 멋진 하루 보내세요 ♥ 🎉";
                textEl.style.fontWeight = "bold";
                textEl.style.fontSize = "1.6em"; 
                authorEl.innerText = "- 사랑하는 딸 올림 -";
                
                startHeartAnimation();
                return; 
            }

            const dayOfMonth = today.getDate();
            const quoteIndex = dayOfMonth - 1;
            const safeIndex = quoteIndex % fatherQuotes.length; 
            const selectedQuote = fatherQuotes[safeIndex];

            quoteCard.classList.remove('birthday-mode');
            textEl.style.fontWeight = "normal";
            textEl.style.fontSize = "1.3em";

            textEl.innerText = `"${selectedQuote.text}"`;
            authorEl.innerText = `- ${selectedQuote.author} -`;
        }

        function updateTime() {
            const now = new Date();
            const options = { timeZone: 'Asia/Seoul', year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('current-time').innerText = "기준: " + now.toLocaleString('ko-KR', options);
        }
        setInterval(updateTime, 1000); updateTime();

        window.switchTab = function(tabName) {
            currentTab = tabName;
            document.getElementById('tab-it').classList.toggle('active', tabName === 'it');
            document.getElementById('tab-trend').classList.toggle('active', tabName === 'trend');
            const targetList = (tabName === 'it') ? itStocks : trendStocks;
            setupStockList(targetList);
            setActiveStock(targetList[0]); 
        };

        function setupStockList(stockArray) {
            const container = document.getElementById('stock-list');
            container.innerHTML = ''; 
            const themeStr = isDarkMode ? "dark" : "light";
            
            stockArray.forEach(stock => {
                const item = document.createElement('div');
                item.className = 'stock-item';
                item.dataset.symbol = stock.symbol;
                if(stock.symbol === currentActiveStock.symbol) item.classList.add('active');

                const overlay = document.createElement('div');
                overlay.className = 'stock-item-overlay';
                overlay.onclick = () => { setActiveStock(stock); };
                item.appendChild(overlay);

                const widgetDiv = document.createElement('div');
                const script = document.createElement('script');
                script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
                script.async = true;
                script.innerHTML = JSON.stringify({
                    "symbol": stock.symbol,
                    "width": "100%",
                    "isTransparent": true,
                    "colorTheme": themeStr,
                    "locale": "kr" 
                });
                widgetDiv.appendChild(script);
                item.appendChild(widgetDiv);
                container.appendChild(item);
            });
        }

        function setActiveStock(stockObj) {
            currentActiveStock = stockObj;
            document.querySelectorAll('.stock-item').forEach(item => {
                if(item.dataset.symbol === stockObj.symbol) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            document.getElementById('chart-main-title').innerText = `📊 ${stockObj.name} 실시간 차트`;
            
            renderChart(stockObj.symbol);
            fetchRealTimeNews(stockObj.keyword, 'company-news-list', 5);
        }

        function renderChart(symbol) {
            const container = document.getElementById('chart-container');
            container.innerHTML = ''; 
            const themeStr = isDarkMode ? "dark" : "light";
            const script = document.createElement('script');
            
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
            script.innerHTML = JSON.stringify({
                "autosize": true,
                "symbol": symbol,
                "interval": "15", 
                "timezone": "Asia/Seoul",
                "theme": themeStr,
                "style": "1",
                "locale": "kr", 
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "studies_overrides": {
                    "volume.volume.color.0": "#0000ff",
                    "volume.volume.color.1": "#ff0000"
                }
            });
            script.async = true;
            container.appendChild(script);
        }

        // 🌟 [핵심 업데이트] 이중 우회(Dual-Proxy) 기술이 적용된 막힘없는 뉴스 수집 로직 🌟
        function fetchRealTimeNews(keyword, listElementId, displayCount) {
            const listEl = document.getElementById(listElementId);
            if(listElementId === 'company-news-list') {
                document.getElementById('company-news-title').innerText = `📰 ${keyword} 최근 관련 뉴스`;
            }
            listEl.innerHTML = '<li>진짜 실시간 뉴스를 긁어오는 중입니다... 잠시만 기다려주세요!</li>';

            const cacheBuster = new Date().getTime();
            let rssUrl = keyword 
                ? `https://news.google.com/rss/search?q=${encodeURIComponent(keyword + " 주식 OR 경제")}&hl=ko&gl=KR&ceid=KR:ko&_=${cacheBuster}`
                : `https://news.google.com/rss/search?q=${encodeURIComponent('경제 OR 증시 OR 금융')}&hl=ko&gl=KR&ceid=KR:ko&_=${cacheBuster}`;

            // 1순위와 2순위 예비 우회 서버 주소
            const proxy1 = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(rssUrl)}`;
            const proxy2 = `https://corsproxy.io/?${encodeURIComponent(rssUrl)}`;

            // 1순위 서버 먼저 찌르기
            fetch(proxy1)
                .then(res => { if(!res.ok) throw new Error(); return res.text(); })
                // 1순위 실패 시 2순위 서버로 재시도 (이중 우회)
                .catch(() => fetch(proxy2).then(res => { if(!res.ok) throw new Error(); return res.text(); }))
                .then(xmlString => {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlString, "text/xml");
                    const items = xmlDoc.querySelectorAll("item");
                    
                    const articles = Array.from(items).map(item => ({
                        title: item.querySelector("title") ? item.querySelector("title").textContent : "제목 없음",
                        link: item.querySelector("link") ? item.querySelector("link").textContent : "#",
                        pubDate: item.querySelector("pubDate") ? item.querySelector("pubDate").textContent : new Date().toISOString()
                    }));

                    if(articles.length === 0) {
                        listEl.innerHTML = '<li>관련 뉴스가 없습니다.</li>';
                        return;
                    }

                    if(listElementId === 'global-news-list') {
                        allGlobalNews = articles; 
                        renderGlobalNewsList();
                        
                        const tickerText = articles.slice(0, 15).map(a => `[속보] ${a.title}`).join(' <span> &nbsp; | &nbsp; </span> ');
                        document.getElementById('ticker-text').innerHTML = `<span>${tickerText}</span>`;
                        
                        if(allGlobalNews.length > currentlyDisplayedGlobalNews) {
                            document.getElementById('load-more-news-btn').style.display = 'block';
                        }
                    } else {
                        listEl.innerHTML = '';
                        articles.slice(0, displayCount).forEach(article => {
                            const li = document.createElement('li');
                            const dateObj = new Date(article.pubDate);
                            const dateStr = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                            li.innerHTML = `<a href="${article.link}" target="_blank">► ${article.title} <span style="font-size:0.8em; color:#888; margin-left:10px;">(${dateStr})</span></a>`;
                            listEl.appendChild(li);
                        });
                    }
                })
                .catch(error => {
                    listEl.innerHTML = '<li>서버 접속자가 너무 많아 지연되고 있습니다. 화면 우측 하단의 새로고침(🔄)을 다시 눌러주세요.</li>';
                });
        }

        function renderGlobalNewsList() {
            const newsList = document.getElementById('global-news-list');
            newsList.innerHTML = '';
            
            const newsToShow = allGlobalNews.slice(0, currentlyDisplayedGlobalNews);
            newsToShow.forEach(article => {
                const li = document.createElement('li');
                const dateObj = new Date(article.pubDate);
                const dateStr = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                
                li.innerHTML = `<a href="${article.link}" target="_blank">► ${article.title} <span style="font-size:0.8em; color:#888; margin-left:10px;">(${dateStr})</span></a>`;
                newsList.appendChild(li);
            });
        }

        document.getElementById('load-more-news-btn').addEventListener('click', (e) => {
            currentlyDisplayedGlobalNews += 10; 
            renderGlobalNewsList();
            if(currentlyDisplayedGlobalNews >= allGlobalNews.length) e.target.style.display = 'none';
        });

        function renderExchangeWidget() {
            const container = document.getElementById('exchange-container');
            container.innerHTML = '<h4 style="margin: 0 0 10px 0;">💱 실시간 환율</h4>';
            const themeStr = isDarkMode ? "dark" : "light";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true;
            script.innerHTML = JSON.stringify({
                "symbol": "FX_IDC:USDKRW",
                "width": "100%",
                "isTransparent": true,
                "colorTheme": themeStr,
                "locale": "kr" 
            });
            container.appendChild(script);
        }

        document.getElementById('toggle-exchange-btn').addEventListener('click', () => {
            isExchangeVisible = !isExchangeVisible;
            const container = document.getElementById('exchange-container');
            const btn = document.getElementById('toggle-exchange-btn');
            
            if(isExchangeVisible) {
                container.classList.remove('hidden');
                btn.innerText = "💱 환율창 숨기기";
            } else {
                container.classList.add('hidden');
                btn.innerText = "💱 환율창 열기";
            }
        });

        document.getElementById('theme-btn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('theme-btn').innerText = isDarkMode ? "☀️" : "🌙";
            
            const targetList = (currentTab === 'it') ? itStocks : trendStocks;
            setupStockList(targetList); 
            renderChart(currentActiveStock.symbol);
            renderExchangeWidget();
        });

        document.getElementById('refresh-btn').addEventListener('click', () => {
            fetchRealTimeNews(null, 'global-news-list', null);
            fetchRealTimeNews(currentActiveStock.keyword, 'company-news-list', 5);
            
            const targetList = (currentTab === 'it') ? itStocks : trendStocks;
            setupStockList(targetList);
            renderChart(currentActiveStock.symbol);
            renderExchangeWidget();
        });

        // 초기 실행
        setupStockList(itStocks);
        setActiveStock(itStocks[0]); 
        renderExchangeWidget();
        
        fetchRealTimeNews(null, 'global-news-list', null);
        displayDailyQuote(); 

    </script>
</body>
</html>
