<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 IT & 경제 실시간 대시보드</title>
    <style>
        /* 테마 변수 설정 */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333333;
            --card-bg: #ffffff;
            --border-color: #dddddd;
            --accent-color: #e74c3c;
            --btn-hover-bg: #f0f0f0;
        }
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f4f7f6;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --btn-hover-bg: #2a2a2a;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 뉴스 전광판 */
        .news-ticker {
            background-color: var(--card-bg);
            padding: 10px 0;
            border-bottom: 2px solid var(--border-color);
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 80s linear infinite;
            font-weight: bold;
        }
        .ticker-content span {
            margin-right: 50px;
        }
        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* 메인 레이아웃 */
        .container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        #current-time { font-size: 0.9em; color: #888; }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        /* 2단 분리 대시보드 레이아웃 */
        .dashboard-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* 좌측 주식 리스트 (전체 노출 & 스크롤) */
        .stock-sidebar {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        .stock-list-container {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .stock-list-container::-webkit-scrollbar { width: 6px; }
        .stock-list-container::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

        .stock-item {
            position: relative;
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 8px;
            transition: border-color 0.2s;
            background: var(--bg-color);
        }
        .stock-item.active {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.3);
        }
        .stock-item-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
        }

        /* 우측 메인 차트 영역 */
        .main-chart-area {
            flex-grow: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .chart-header h2 { margin: 0 0 15px 0; }
        #chart-container { height: 600px; width: 100%; }

        @media (max-width: 900px) {
            .dashboard-layout { flex-direction: column; }
            .stock-sidebar { width: 100%; }
            .stock-list-container { flex-direction: row; overflow-x: auto; max-height: 120px; padding-bottom: 10px; }
            .stock-item { min-width: 250px; }
        }

        /* 하단 뉴스 리스트 */
        #news-list { list-style: none; padding: 0; margin: 0; }
        #news-list li { padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        #news-list a { text-decoration: none; color: var(--text-color); font-size: 1.1em; }
        #news-list a:hover { color: var(--accent-color); }
        
        .load-more-btn {
            display: block; width: 100%; padding: 12px; margin-top: 15px;
            background-color: transparent; border: 2px solid var(--border-color);
            color: var(--text-color); font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: 0.2s; text-align: center;
        }
        .load-more-btn:hover { background-color: var(--btn-hover-bg); color: var(--accent-color); border-color: var(--accent-color); }

        /* 플로팅 환율 UI & 토글 버튼 */
        .exchange-wrapper {
            position: fixed; right: 20px; top: 80px; z-index: 1000;
            display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
        }
        #toggle-exchange-btn {
            background-color: var(--card-bg); color: var(--text-color);
            border: 1px solid var(--border-color); padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s;
        }
        #toggle-exchange-btn:hover { background-color: var(--btn-hover-bg); }
        
        .floating-exchange {
            width: 250px; background: var(--card-bg); padding: 10px;
            border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            transition: opacity 0.3s, transform 0.3s;
        }
        .floating-exchange.hidden {
            opacity: 0; pointer-events: none; transform: translateY(-10px);
        }
        
        @media (max-width: 1100px) { .exchange-wrapper { display: none; } }

        /* 우측 하단 고정 제어 버튼 */
        .floating-controls {
            position: fixed; right: 20px; bottom: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .action-btn {
            background-color: var(--text-color); color: var(--bg-color);
            border: none; padding: 15px; border-radius: 50%;
            cursor: pointer; font-size: 1.2em; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="news-ticker">
        <div class="ticker-content" id="ticker-text">
            <span>최신 경제 뉴스를 불러오는 중입니다...</span>
        </div>
    </div>

    <div class="exchange-wrapper">
        <button id="toggle-exchange-btn">💱 환율창 숨기기</button>
        <div class="floating-exchange" id="exchange-container"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🌐 글로벌 IT 대장주 & 경제 대시보드</h1>
            <p id="current-time">대한민국 표준시 로딩 중...</p>
        </div>

        <div class="card">
            <div class="dashboard-layout">
                <div class="stock-sidebar">
                    <h3 style="margin-top: 0; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;">관심 종목 시세</h3>
                    <div class="stock-list-container" id="stock-list"></div>
                </div>

                <div class="main-chart-area">
                    <div class="chart-header">
                        <h2>📊 실시간 증시 현황 (고급 차트)</h2>
                    </div>
                    <div id="chart-container"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">📰 최신 경제 뉴스 타임라인</h2>
            <ul id="news-list">
                <li>뉴스를 불러오는 중입니다...</li>
            </ul>
            <button class="load-more-btn" id="load-more-news-btn" style="display: none;">📰 더 많은 뉴스 펼쳐보기</button>
        </div>
    </div>

    <div class="floating-controls">
        <button class="action-btn" id="theme-btn" title="다크 모드 전환">🌙</button>
        <button class="action-btn" id="refresh-btn" title="데이터 새로고침">🔄</button>
    </div>

    <script>
        let isDarkMode = false;
        let currentSymbol = 'NASDAQ:NVDA';
        let isExchangeVisible = true;
        
        // 뉴스 데이터 저장용 배열
        let allNewsItems = [];
        let currentlyDisplayedNews = 5;

        // 전체 주식 목록
        const allStocks = [
            { symbol: 'NASDAQ:NVDA' },
            { symbol: 'NASDAQ:TSLA' },
            { symbol: 'KRX:000660' }, // SK하이닉스
            { symbol: 'NASDAQ:PLTR' },
            { symbol: 'NASDAQ:RKLB' },
            { symbol: 'NASDAQ:AAPL' },
            { symbol: 'NASDAQ:MSFT' },
            { symbol: 'NASDAQ:GOOGL' },
            { symbol: 'NASDAQ:META' },
            { symbol: 'NASDAQ:AMD' },
            { symbol: 'KRX:005930' } // 삼성전자
        ];

        // 시계 업데이트
        function updateTime() {
            const now = new Date();
            const options = { timeZone: 'Asia/Seoul', year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('current-time').innerText = "기준: " + now.toLocaleString('ko-KR', options);
        }
        setInterval(updateTime, 1000); updateTime();

        // 좌측 미니 시세표 리스트 (전체 렌더링)
        function setupStockList() {
            const container = document.getElementById('stock-list');
            container.innerHTML = ''; 
            const themeStr = isDarkMode ? "dark" : "light";
            
            allStocks.forEach(stock => {
                const item = document.createElement('div');
                item.className = 'stock-item';
                item.dataset.symbol = stock.symbol;
                if(stock.symbol === currentSymbol) item.classList.add('active');

                const overlay = document.createElement('div');
                overlay.className = 'stock-item-overlay';
                overlay.onclick = () => { setActiveStock(stock.symbol); };
                item.appendChild(overlay);

                const widgetDiv = document.createElement('div');
                const script = document.createElement('script');
                script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
                script.async = true;
                script.innerHTML = JSON.stringify({
                    "symbol": stock.symbol,
                    "width": "100%",
                    "isTransparent": true,
                    "colorTheme": themeStr,
                    "locale": "kr"
                });
                widgetDiv.appendChild(script);
                item.appendChild(widgetDiv);
                container.appendChild(item);
            });
        }

        // 종목 클릭 시
        function setActiveStock(symbol) {
            currentSymbol = symbol;
            document.querySelectorAll('.stock-item').forEach(item => {
                if(item.dataset.symbol === symbol) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            renderChart(currentSymbol);
        }

        // 메인 차트 렌더링 (국내 주식 지원을 위해 '고급 차트'로 고정)
        function renderChart(symbol) {
            const container = document.getElementById('chart-container');
            container.innerHTML = ''; 
            const themeStr = isDarkMode ? "dark" : "light";
            const script = document.createElement('script');
            
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
            script.innerHTML = JSON.stringify({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Asia/Seoul",
                "theme": themeStr,
                "style": "1",
                "locale": "kr",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "studies_overrides": {
                    "volume.volume.color.0": "#0000ff", // 하락 파랑
                    "volume.volume.color.1": "#ff0000"  // 상승 빨강
                }
            });
            
            script.async = true;
            container.appendChild(script);
        }

        // 환율 위젯
        function renderExchangeWidget() {
            const container = document.getElementById('exchange-container');
            container.innerHTML = '<h4 style="margin: 0 0 10px 0;">💱 실시간 환율</h4>';
            const themeStr = isDarkMode ? "dark" : "light";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true;
            script.innerHTML = JSON.stringify({
                "symbol": "FX_IDC:USDKRW",
                "width": "100%",
                "isTransparent": true,
                "colorTheme": themeStr,
                "locale": "kr"
            });
            container.appendChild(script);
        }

        // 환율 위젯 숨기기/열기 토글
        document.getElementById('toggle-exchange-btn').addEventListener('click', () => {
            isExchangeVisible = !isExchangeVisible;
            const container = document.getElementById('exchange-container');
            const btn = document.getElementById('toggle-exchange-btn');
            
            if(isExchangeVisible) {
                container.classList.remove('hidden');
                btn.innerText = "💱 환율창 숨기기";
            } else {
                container.classList.add('hidden');
                btn.innerText = "💱 환율창 열기";
            }
        });

        // 뉴스 로딩 및 더 보기 기능
        function loadNews() {
            const rssUrl = 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=ko&gl=KR&ceid=KR:ko';
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if(data.status !== "ok") throw new Error("API 오류");
                    
                    // 전체 뉴스를 저장
                    allNewsItems = data.items;
                    currentlyDisplayedNews = 5; // 처음엔 5개만
                    
                    // 전광판 세팅 (10개 정도만 롤링)
                    const tickerText = allNewsItems.slice(0, 10).map(a => `[속보] ${a.title}`).join(' <span> &nbsp; | &nbsp; </span> ');
                    document.getElementById('ticker-text').innerHTML = `<span>${tickerText}</span>`;

                    renderNewsList();
                    
                    // 뉴스가 5개 이상이면 '더 보기' 버튼 표시
                    if(allNewsItems.length > 5) {
                        document.getElementById('load-more-news-btn').style.display = 'block';
                    }
                })
                .catch(error => console.error('뉴스 실패:', error));
        }

        function renderNewsList() {
            const newsList = document.getElementById('news-list');
            newsList.innerHTML = '';
            
            const newsToShow = allNewsItems.slice(0, currentlyDisplayedNews);
            newsToShow.forEach(article => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${article.link}" target="_blank">► ${article.title}</a>`;
                newsList.appendChild(li);
            });
        }

        // 뉴스 더 보기 버튼 이벤트
        document.getElementById('load-more-news-btn').addEventListener('click', (e) => {
            currentlyDisplayedNews += 10; // 누를 때마다 10개씩 추가 표시
            renderNewsList();
            
            // 더 이상 보여줄 뉴스가 없으면 버튼 숨기기
            if(currentlyDisplayedNews >= allNewsItems.length) {
                e.target.style.display = 'none';
            }
        });

        // 테마 및 새로고침
        document.getElementById('theme-btn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('theme-btn').innerText = isDarkMode ? "☀️" : "🌙";
            
            setupStockList(); 
            renderChart(currentSymbol);
            renderExchangeWidget();
        });

        document.getElementById('refresh-btn').addEventListener('click', () => {
            loadNews();
            setupStockList();
            renderChart(currentSymbol);
            renderExchangeWidget();
        });

        // 초기 실행
        setupStockList();
        renderChart(currentSymbol);
        renderExchangeWidget();
        loadNews();

    </script>
</body>
</html>
