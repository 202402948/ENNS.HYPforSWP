<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 IT & 경제 실시간 대시보드</title>
    <style>
        /* 테마 변수 설정 */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333333;
            --card-bg: #ffffff;
            --border-color: #dddddd;
            --accent-color: #e74c3c;
        }
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f4f7f6;
            --card-bg: #1e1e1e;
            --border-color: #333333;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 뉴스 전광판 (속도 느리게 수정: 80s) */
        .news-ticker {
            background-color: var(--card-bg);
            padding: 10px 0;
            border-bottom: 2px solid var(--border-color);
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 80s linear infinite; /* 속도 2배 느리게 */
            font-weight: bold;
        }
        .ticker-content span {
            margin-right: 50px;
        }
        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* 레이아웃 */
        .container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        #current-time { font-size: 0.9em; color: #888; }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        /* 전문가형 2단 분리 대시보드 레이아웃 */
        .dashboard-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* 좌측 주식 리스트 패널 */
        .stock-sidebar {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .stock-list-container {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* 스크롤바 디자인 */
        .stock-list-container::-webkit-scrollbar { width: 6px; }
        .stock-list-container::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

        /* 개별 미니 시세표 항목 */
        .stock-item {
            position: relative;
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 8px;
            transition: border-color 0.2s;
            background: var(--bg-color);
        }
        .stock-item.active {
            border-color: var(--accent-color); /* 선택된 종목 강조 */
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.3);
        }
        .stock-item-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; /* 클릭 인식을 위해 위젯을 투명하게 덮음 */
        }

        /* 전체보기 버튼 */
        #toggle-stocks-btn {
            background-color: var(--card-bg);
            border: 1px dashed #888;
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        #toggle-stocks-btn:hover { background-color: rgba(0,0,0,0.05); }

        /* 우측 메인 차트 */
        #chart-container { 
            flex-grow: 1; 
            height: 550px; 
            min-width: 0; 
        }

        /* 반응형 모바일 (화면이 작아지면 리스트를 위로 올림) */
        @media (max-width: 900px) {
            .dashboard-layout { flex-direction: column; }
            .stock-sidebar { width: 100%; }
            .stock-list-container { flex-direction: row; overflow-x: auto; max-height: 120px; padding-bottom: 10px; }
            .stock-item { min-width: 250px; }
        }

        /* 하단 뉴스 리스트 */
        #news-list { list-style: none; padding: 0; margin: 0; }
        #news-list li { padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        #news-list a { text-decoration: none; color: var(--text-color); font-size: 1.1em; }
        #news-list a:hover { color: var(--accent-color); }

        /* 플로팅 UI */
        .floating-exchange {
            position: fixed; right: 20px; top: 80px; width: 250px;
            background: var(--card-bg); padding: 10px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000;
            border: 1px solid var(--border-color);
        }
        @media (max-width: 1100px) { .floating-exchange { display: none; } }

        .floating-controls {
            position: fixed; right: 20px; bottom: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .action-btn {
            background-color: var(--text-color); color: var(--bg-color);
            border: none; padding: 15px; border-radius: 50%;
            cursor: pointer; font-size: 1.2em; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="news-ticker">
        <div class="ticker-content" id="ticker-text">
            <span>최신 경제 뉴스를 불러오는 중입니다... 잠시만 기다려주세요.</span>
        </div>
    </div>

    <div class="floating-exchange" id="exchange-container"></div>

    <div class="container">
        <div class="header">
            <h1>🌐 글로벌 IT 대장주 & 경제 대시보드</h1>
            <p id="current-time">대한민국 표준시 로딩 중...</p>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">📊 실시간 증시 현황 및 주가 차트</h2>
            
            <div class="dashboard-layout">
                <div class="stock-sidebar">
                    <div class="stock-list-container" id="stock-list">
                        </div>
                    <button id="toggle-stocks-btn">➕ 주식 정보 전체보기</button>
                </div>

                <div id="chart-container"></div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">📰 최신 경제 뉴스 타임라인</h2>
            <ul id="news-list">
                <li>뉴스를 불러오는 중입니다...</li>
            </ul>
        </div>
    </div>

    <div class="floating-controls">
        <button class="action-btn" id="theme-btn" title="다크 모드 전환">🌙</button>
        <button class="action-btn" id="refresh-btn" title="데이터 새로고침">🔄</button>
    </div>

    <script>
        let isDarkMode = false;
        let currentSymbol = 'NASDAQ:NVDA';
        let showAllStocks = false;

        const allStocks = [
            { symbol: 'NASDAQ:NVDA' },
            { symbol: 'NASDAQ:TSLA' },
            { symbol: 'KRX:000660' }, // SK하이닉스
            { symbol: 'NASDAQ:PLTR' },
            { symbol: 'NASDAQ:RKLB' },
            { symbol: 'NASDAQ:AAPL' },
            { symbol: 'NASDAQ:MSFT' },
            { symbol: 'NASDAQ:GOOGL' },
            { symbol: 'NASDAQ:META' },
            { symbol: 'NASDAQ:AMD' },
            { symbol: 'KRX:005930' } // 삼성전자
        ];

        function updateTime() {
            const now = new Date();
            const options = { timeZone: 'Asia/Seoul', year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('current-time').innerText = "기준: " + now.toLocaleString('ko-KR', options);
        }
        setInterval(updateTime, 1000); updateTime();

        // 1. 좌측 미니 시세표 리스트 생성
        function setupStockList() {
            const container = document.getElementById('stock-list');
            container.innerHTML = ''; 
            
            const displayStocks = showAllStocks ? allStocks : allStocks.slice(0, 5);
            const themeStr = isDarkMode ? "dark" : "light";
            
            displayStocks.forEach(stock => {
                const item = document.createElement('div');
                item.className = 'stock-item';
                item.dataset.symbol = stock.symbol; // 식별자 저장
                if(stock.symbol === currentSymbol) item.classList.add('active');

                // 클릭 인식을 위한 투명 막(Overlay)
                const overlay = document.createElement('div');
                overlay.className = 'stock-item-overlay';
                overlay.onclick = () => { setActiveStock(stock.symbol); };
                item.appendChild(overlay);

                // 트레이딩뷰 미니 시세(Single Quote) 위젯
                const widgetDiv = document.createElement('div');
                const script = document.createElement('script');
                script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
                script.async = true;
                script.innerHTML = JSON.stringify({
                    "symbol": stock.symbol,
                    "width": "100%",
                    "isTransparent": true,
                    "colorTheme": themeStr,
                    "locale": "kr"
                });
                widgetDiv.appendChild(script);
                item.appendChild(widgetDiv);

                container.appendChild(item);
            });
        }

        // 2. 활성화된 종목 표시 변경 및 차트 렌더링
        function setActiveStock(symbol) {
            currentSymbol = symbol;
            
            // 리스트 테두리 색상(active 클래스) 업데이트
            document.querySelectorAll('.stock-item').forEach(item => {
                if(item.dataset.symbol === symbol) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            renderChart(currentSymbol);
        }

        // 3. 우측 메인 차트 렌더링 (한국식 색상 적용)
        function renderChart(symbol) {
            const container = document.getElementById('chart-container');
            container.innerHTML = ''; 
            const themeStr = isDarkMode ? "dark" : "light";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
            script.async = true;
            script.innerHTML = JSON.stringify({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Asia/Seoul",
                "theme": themeStr,
                "style": "1",
                "locale": "kr",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "studies_overrides": {
                    "volume.volume.color.0": "#0000ff", // 하락(파랑)
                    "volume.volume.color.1": "#ff0000"  // 상승(빨강)
                }
            });
            container.appendChild(script);
        }

        // 환율 위젯
        function renderExchangeWidget() {
            const container = document.getElementById('exchange-container');
            container.innerHTML = '<h4 style="margin: 0 0 10px 0;">💱 실시간 환율</h4>';
            const themeStr = isDarkMode ? "dark" : "light";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true;
            script.innerHTML = JSON.stringify({
                "symbol": "FX_IDC:USDKRW",
                "width": "100%",
                "isTransparent": true,
                "colorTheme": themeStr,
                "locale": "kr"
            });
            container.appendChild(script);
        }

        // 뉴스 로딩 (구글 경제)
        function loadNews() {
            const rssUrl = 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=ko&gl=KR&ceid=KR:ko';
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if(data.status !== "ok") throw new Error("API 오류");
                    const articles = data.items.slice(0, 10);
                    
                    const tickerText = articles.map(a => `[속보] ${a.title}`).join(' <span> &nbsp; | &nbsp; </span> ');
                    document.getElementById('ticker-text').innerHTML = `<span>${tickerText}</span>`;

                    const newsList = document.getElementById('news-list');
                    newsList.innerHTML = '';
                    articles.forEach(article => {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="${article.link}" target="_blank">► ${article.title}</a>`;
                        newsList.appendChild(li);
                    });
                })
                .catch(error => console.error('뉴스 실패:', error));
        }

        // 이벤트 리스너: 전체보기 버튼
        document.getElementById('toggle-stocks-btn').addEventListener('click', (e) => {
            showAllStocks = !showAllStocks;
            e.target.innerText = showAllStocks ? "➖ 주식 정보 접기" : "➕ 주식 정보 전체보기";
            setupStockList(); // 리스트 다시 그리기
        });

        // 이벤트 리스너: 테마 및 새로고침
        document.getElementById('theme-btn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('theme-btn').innerText = isDarkMode ? "☀️" : "🌙";
            
            // 테마가 바뀌면 모든 위젯을 다시 그려야 함
            setupStockList(); 
            renderChart(currentSymbol);
            renderExchangeWidget();
        });

        document.getElementById('refresh-btn').addEventListener('click', () => {
            loadNews();
            setupStockList();
            renderChart(currentSymbol);
            renderExchangeWidget();
        });

        // 초기 실행
        setupStockList();
        renderChart(currentSymbol);
        renderExchangeWidget();
        loadNews();

    </script>
</body>
</html>
