<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠를 위한 글로벌 IT & 경제 실시간 대시보드</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        /* 🎨 테마 및 기본 스타일 설정 */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333333;
            --card-bg: #ffffff;
            --border-color: #dddddd;
            --accent-color: #e74c3c;
            --heart-color: #d81b60;
            --btn-hover-bg: #f0f0f0;
        }
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f4f7f6;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --btn-hover-bg: #2a2a2a;
            --heart-color: #ffb6b9;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* 🚀 뉴스 전광판 */
        .news-ticker {
            background-color: var(--card-bg); padding: 10px 0; border-bottom: 2px solid var(--border-color);
            overflow: hidden; white-space: nowrap; position: relative; z-index: 10;
        }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker 80s linear infinite; font-weight: bold; }
        .ticker-content span { margin-right: 50px; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* 📦 레이아웃 및 카드 */
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 20px; }
        #current-time { font-size: 0.9em; color: #888; }
        
        .card {
            background-color: var(--card-bg); border-radius: 12px; padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid var(--border-color);
        }

        /* 📊 대시보드 메인 영역 (트랜스포머 레이아웃) */
        .dashboard-layout { display: flex; gap: 20px; align-items: flex-start; }
        .stock-sidebar { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; transition: width 0.3s; }
        .main-chart-area { flex-grow: 1; min-width: 0; display: flex; flex-direction: column; }
        
        /* 🌟 주도주 탭을 눌렀을 때 발동하는 화면 전체 확장 모드! 🌟 */
        .dashboard-layout.trend-mode .stock-sidebar { width: 100%; } /* 좌측을 100%로 꽉 채움 */
        .dashboard-layout.trend-mode .main-chart-area { display: none; } /* 우측 차트 영역 숨김 */

        /* 탭 버튼 스타일 */
        .sidebar-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 15px 5px; border: 2px solid var(--border-color);
            background-color: var(--bg-color); color: var(--text-color);
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
            font-size: 1.1em;
        }
        .tab-btn.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }
        
        #stock-list-wrapper { width: 100%; }
        
        /* 핫리스트 위젯 전용 넉넉한 공간 */
        .trend-widget-container { height: 800px; width: 100%; border-radius: 8px; overflow: hidden; }

        .stock-list-container {
            max-height: 650px; overflow-y: auto; padding-right: 5px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .stock-list-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .stock-list-container::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }
        
        .stock-item {
            position: relative; cursor: pointer; border: 3px solid transparent;
            border-radius: 8px; transition: border-color 0.2s; background: var(--bg-color);
        }
        .stock-item.active { border-color: var(--accent-color); box-shadow: 0 0 10px rgba(231, 76, 60, 0.3); }
        .stock-item-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        #chart-container { height: 500px; width: 100%; margin-bottom: 20px; }
        
        .company-news-area { padding-top: 15px; border-top: 2px dashed var(--border-color); }
        .company-news-list { list-style: none; padding: 0; margin: 0; min-height: 100px; }
        .company-news-list li { padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .company-news-list a { text-decoration: none; color: var(--text-color); font-size: 1.05em; font-weight: bold; }

        .loading-text { text-align: center; padding: 30px; color: #888; font-weight: bold; font-size: 1.1em; line-height: 1.5; }

        /* 📱 모바일 최적화 */
        @media (max-width: 900px) {
            .dashboard-layout { flex-direction: column; }
            .stock-sidebar { width: 100%; }
            .dashboard-layout.trend-mode .stock-sidebar { width: 100%; }
            
            .stock-list-container { 
                flex-direction: row; overflow-x: auto; max-height: none; 
                padding-bottom: 15px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; 
            }
            .stock-item { min-width: 280px; flex-shrink: 0; scroll-snap-align: start; }
            #chart-container { height: 280px; }
            
            .exchange-wrapper { position: static; width: 100%; margin-bottom: 20px; align-items: stretch; }
            .floating-exchange { width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        }

        /* 💰 환율 및 뉴스 더보기 */
        .exchange-wrapper { position: fixed; right: 20px; top: 80px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        #toggle-exchange-btn { 
            background-color: var(--card-bg); color: var(--text-color); 
            border: 1px solid var(--border-color); padding: 8px 15px; 
            border-radius: 20px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .floating-exchange { 
            width: 250px; background: var(--card-bg); padding: 10px; 
            border-radius: 10px; border: 1px solid var(--border-color); transition: 0.3s; 
        }
        .floating-exchange.hidden { opacity: 0; pointer-events: none; }
        
        #global-news-list { list-style: none; padding: 0; margin: 0; min-height: 100px; }
        #global-news-list li { padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        #global-news-list a { text-decoration: none; color: var(--text-color); font-size: 1.1em; }
        .load-more-btn { display: block; width: 100%; padding: 12px; margin-top: 15px; background: transparent; border: 2px solid var(--border-color); color: var(--text-color); font-weight: bold; border-radius: 8px; cursor: pointer; }

        /* 🎂 명언 & 생일 특별 영역 (다크모드 글씨 검은색) */
        .quote-card { 
            background: linear-gradient(135deg, #f6f8f9 0%, #e5ebee 100%); 
            border: 1px solid #dce1e4; text-align: center; padding: 40px 20px; margin-top: 30px; 
        }
        body.dark-mode .quote-card { 
            background: linear-gradient(135deg, #e0e5e8 0%, #f0f2f5 100%); 
            border-color: #bbb;
        }
        body.dark-mode .quote-text { color: #000000 !important; } 
        body.dark-mode .quote-author { color: #333333 !important; } 

        .quote-card.birthday-mode { 
            background: linear-gradient(135deg, #fff0f0 0%, #ffe0e0 100%); 
            border-color: #ffcccc; box-shadow: 0 0 20px rgba(231, 76, 60, 0.2); 
        }
        body.dark-mode .quote-card.birthday-mode { background: linear-gradient(135deg, #ffe0e0 0%, #ffd0d0 100%); }
        .quote-card.birthday-mode .quote-text, body.dark-mode .quote-card.birthday-mode .quote-text { color: var(--heart-color) !important; font-weight: bold; font-size: 1.6em; }
        
        .quote-text { font-size: 1.3em; line-height: 1.6; margin-bottom: 15px; transition: 0.3s; color: #111; }
        .quote-author { font-size: 1.1em; color: #555; font-weight: bold; transition: 0.3s; }

        /* 💖 하트 버튼 컨테이너 */
        .heart-btn-container { text-align: center; margin-top: 50px; margin-bottom: 80px; }
        .heart-send-btn {
            display: inline-block; padding: 18px 40px; background-color: var(--heart-color); color: white; 
            font-weight: bold; font-size: 1.3em; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3); transition: all 0.3s ease;
        }
        .heart-send-btn:disabled { background-color: #bbb; box-shadow: none; cursor: default; }
        .heart-send-btn:hover:not(:disabled) { transform: scale(1.05); }

        /* ✨ 하트 애니메이션 효과 */
        .heart-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 99999; display: none; }
        .floating-heart { position: absolute; bottom: -10vh; color: rgba(255, 182, 193, 0.7); font-size: 2rem; animation: floatUp ease-in forwards; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; } 100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; } }

        /* 🎁 거대 하트 마일스톤 이펙트 */
        #giant-heart-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20000000; color: white; text-align: center;
        }
        .giant-heart-icon { font-size: 150px; color: var(--heart-color); animation: heartBeat 1s infinite; margin-bottom: 20px; }
        @keyframes heartBeat { 0%, 50%, 100% { transform: scale(1); } 25%, 75% { transform: scale(1.2); } }
        .giant-heart-text { font-size: 2.2em; font-weight: bold; text-shadow: 0 0 15px rgba(255,182,193,0.8); line-height: 1.5; padding: 20px; }

        /* 🌙 플로팅 컨트롤 */
        .floating-controls { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10000; }
        .action-btn { background-color: var(--text-color); color: var(--bg-color); border: none; padding: 15px; border-radius: 50%; cursor: pointer; font-size: 1.2em; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="giant-heart-overlay">
        <div class="giant-heart-icon">💖</div>
        <div class="giant-heart-text" id="giant-heart-msg"></div>
    </div>

    <div id="heart-container" class="heart-container"></div>

    <div class="news-ticker">
        <div class="ticker-content" id="ticker-text"><span>최신 경제 뉴스를 불러오고 있습니다... 잠시만 기다려주세요.</span></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🌐 아빠를 위한 글로벌 IT 대장주 & 경제 대시보드</h1>
            <p id="current-time">시간 로딩 중...</p>
        </div>

        <div class="exchange-wrapper">
            <button id="toggle-exchange-btn">💱 환율창 숨기기</button>
            <div class="floating-exchange" id="exchange-container">
                <div class="loading-text">💱 환율 로딩 중...</div>
            </div>
        </div>

        <div class="card">
            <div class="dashboard-layout" id="main-dashboard-layout">
                <div class="stock-sidebar">
                    <div class="sidebar-tabs">
                        <button id="tab-it" class="tab-btn active" onclick="switchTab('it')">💻 IT 대장주</button>
                        <button id="tab-trend" class="tab-btn" onclick="switchTab('trend')">🔥 실시간 주도주</button>
                    </div>
                    <div id="stock-list-wrapper">
                        <div class="stock-list-container" id="stock-list">
                            <div class="loading-text">⏳ 데이터를 불러오는 중입니다...</div>
                        </div>
                    </div>
                </div>
                <div class="main-chart-area">
                    <div class="chart-header"><h2 id="chart-main-title">📊 실시간 증시 현황</h2></div>
                    <div id="chart-container">
                        <div class="loading-text" style="padding-top: 100px;">📊 차트를 안전하게<br>가져오는 중입니다...</div>
                    </div>
                    <div class="company-news-area">
                        <h3 id="company-news-title">📰 기업 관련 뉴스</h3>
                        <ul class="company-news-list" id="company-news-list">
                            <li><div class="loading-text" style="padding:10px;">뉴스를 가져오는 중입니다...</div></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📰 글로벌 경제 시황</h2>
            <ul id="global-news-list">
                <li><div class="loading-text" style="padding:10px;">실시간 경제 뉴스를 스캔 중입니다...</div></li>
            </ul>
            <button class="load-more-btn" id="load-more-news-btn" style="display: none;" onclick="loadMoreNews()">📰 경제 뉴스 더보기</button>
        </div>

        <div class="card quote-card" id="quote-card-container">
            <div class="quote-text" id="daily-quote-text">오늘의 명언을 준비 중입니다...</div>
            <div class="quote-author" id="daily-quote-author"></div>
        </div>
        
        <div class="heart-btn-container">
            <button class="heart-send-btn" id="heart-send-btn" onclick="sendHeartToDaughter()">💖 예쁜 딸에게 하트 보내기</button>
        </div>
    </div>

    <div class="floating-controls">
        <button class="action-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
        <button class="action-btn" id="refresh-btn" onclick="refreshAll()">🔄</button>
    </div>

    <script>
        let isDarkMode = false;
        let isExchangeVisible = true;
        let currentTab = 'it';
        let currentActiveStock = null;
        let allGlobalNews = [];
        let currentlyDisplayedGlobalNews = 5;

        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1479009818688618609/rDkprTq53ZHmaF6_ROZlBCz7asjPmAE9gmEoQipoC3gTpAu7PkVoFUUQCoHvEdSpjffL";

        function updateTime() {
            const now = new Date();
            const options = { timeZone: 'Asia/Seoul', year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('current-time').innerText = "기준: " + now.toLocaleString('ko-KR', options);
        }

        function startHeartAnimation() {
            const container = document.getElementById('heart-container');
            container.style.display = 'block'; 
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerText = '♥'; 
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 4 + 's';
                heart.style.fontSize = Math.random() * 1.5 + 1 + 'rem';
                container.appendChild(heart);
                setTimeout(() => { heart.remove(); }, 7000); 
            }, 400); 
        }

        function sendHeartToDaughter() {
            const btn = document.getElementById('heart-send-btn');
            const originalText = btn.innerText;
            btn.innerText = "✨ 하트 전송 완료!";
            btn.disabled = true;

            let totalClicks = parseInt(localStorage.getItem('daddy_heart_total_clicks') || '0');
            totalClicks++;
            localStorage.setItem('daddy_heart_total_clicks', totalClicks);

            let realHeartCount = totalClicks - 5;

            if (realHeartCount > 0 && realHeartCount % 100 === 0) {
                showGiantHeart(realHeartCount);
            }

            const sweetMessages = [
                "💖 [아빠의 하트 도착!] 아빠가 우리 예쁜 딸을 생각하며 방금 하트를 꾹 눌렀어요! 오늘도 딸 덕분에 아빠는 행복합니다. 🥰",
                "💖 [사랑의 알림] 세상에서 제일 든든한 우리 아빠가 예쁜 딸에게 사랑을 보냈습니다! 오늘 하루도 화이팅! 💕",
                "💖 [아빠의 마음] 띠링~ 아빠가 대시보드를 보다가 우리 딸 생각이 나서 하트를 보냈어요! 아빠의 비타민은 역시 우리 딸! 🍓",
                "💖 [행복 전송] 아빠가 방금 활짝 웃으시며 하트를 보냈습니다! 예쁘게 만들어줘서 고맙다는 아빠의 작은 선물이에요. 🎁"
            ];
            
            let randomMsg = sweetMessages[Math.floor(Math.random() * sweetMessages.length)];
            let finalMessage = randomMsg;
            
            if(realHeartCount > 0) {
                finalMessage += `\n*(딸에게 보낸 ${realHeartCount}번째 사랑입니다!)*`;
            } else {
                finalMessage += `\n*(버튼 테스트 중입니다. 실제 카운트는 6번째부터 시작됩니다!)*`;
            }

            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `${finalMessage}\n(보낸 시간: ${new Date().toLocaleString('ko-KR', {timeZone:'Asia/Seoul'})})` })
            }).catch(e => console.log("전송 오류"));

            setTimeout(() => { btn.innerText = originalText; btn.disabled = false; }, 3000);
        }

        function showGiantHeart(count) {
            const overlay = document.getElementById('giant-heart-overlay');
            document.getElementById('giant-heart-msg').innerHTML = `🎉 세상에! 🎉<br>우리 예쁜 딸에게<br>하트를 벌써 <span style="color:#ffb6b9; font-size:1.5em;">${count}</span>번이나 보내셨어요!<br><br>아빠의 사랑이 듬뿍 쌓였습니다 💖`;
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 5000);
        }

        const lunarBirthdayToSolar = {

            2031: "02-19", 2032: "03-09", 2033: "02-27", 2034: "03-18", 2035: "03-07",
            2036: "02-24", 2037: "03-14", 2038: "03-03", 2039: "02-20", 2040: "03-10",

            2046: "03-05", 2047: "02-22", 2048: "03-12", 2049: "03-01", 2050: "02-19",
            2051: "03-10", 2052: "02-28", 2053: "03-18", 2054: "03-07", 2055: "02-24", 2056: "03-13" 
        };

        const fatherQuotes = [
            { text: "나이를 먹는다는 것은 등산을 하는 것과 같다. 오를수록 숨은 차지만, 시야는 점점 넓어진다.", author: "잉그마르 베르히만" },

            { text: "가장 훌륭한 일은 아직 시작되지 않았다. 최고의 날들은 아직 살아보지 않은 날들이다.", author: "토마스 머튼" },
            { text: "나무는 겨울에 자라지 않는 것처럼 보이지만, 사실은 다가올 봄을 위해 가장 깊고 단단한 뿌리를 내리고 있습니다.", author: "작자 미상" },
            { text: "성공이란 늙어가는 것을 두려워하지 않고, 매 순간을 자신의 속도에 맞춰 당당하게 걸어가는 것이다.", author: "알베르 카뮈" },
            { text: "당신이 지금까지 살아온 모든 순간이, 앞으로 살아갈 날들을 위한 가장 완벽한 준비 운동이었습니다.", author: "작자 미상" },
            { text: "인생의 2막은 지금까지 쌓아온 지혜와 여유를 마음껏 펼칠 수 있는 진정한 황금기입니다.", author: "작자 미상" },
            { text: "아름다운 노후는 그동안 흘린 땀방울이 만들어낸 가장 값진 훈장입니다.", author: "작자 미상" },
            { text: "당신의 50대는 지난 세월의 지혜와 다가올 시간의 여유가 만나는 아름다운 교차로입니다.", author: "작자 미상" },
            { text: "진정한 여행은 새로운 풍경을 보는 것이 아니라, 새로운 눈을 가지는 데 있다.", author: "마르셀 프루스트" },
            { text: "행복은 산꼭대기에 있는 것이 아니라, 산을 오르는 과정 곳곳에 피어 있습니다.", author: "작자 미상" },
            { text: "가장 깊은 밤에 가장 빛나는 별이 뜹니다. 아버지의 인생 2막은 그 어느 때보다 빛날 것입니다.", author: "작자 미상" },
            { text: "나이는 숫자에 불과하다. 중요한 것은 당신이 품고 있는 꿈과 열정의 크기이다.", author: "작자 미상" },
            { text: "때로는 속도를 늦추고 주변의 풍경을 감상하는 것이, 더 멀리 가는 가장 좋은 방법입니다.", author: "작자 미상" },
            { text: "가장 위대한 유산은 재물이 아니라, 아버지가 보여주신 묵묵한 성실함과 따뜻한 사랑입니다.", author: "작자 미상" },
            { text: "지금까지는 가족을 위해 달렸다면, 이제는 온전히 아버지만을 위한 왈츠를 추실 시간입니다.", author: "작자 미상" },
            { text: "오랜 세월 비바람을 견뎌낸 거목만이 가장 시원한 그늘을 만들어 줍니다. 감사합니다.", author: "작자 미상" },
            { text: "새로운 시작을 두려워하지 마세요. 당신의 경험이라는 나침반이 가장 정확한 길을 안내할 것입니다.", author: "작자 미상" },
            { text: "인생은 속도가 아니라 방향입니다. 이제는 마음이 이끄는 방향으로 걸어가세요.", author: "괴테" },
            { text: "수십 년의 성실함으로 지어 올린 당신의 인생은 그 어떤 빌딩보다 견고하고 아름답습니다.", author: "작자 미상" },
            { text: "은퇴는 직업에서 물러나는 가장 빛나는 첫걸음입니다.", author: "작자 미상" },
            { text: "매일 아침 눈을 뜨는 것이 기대되는 삶, 그것이 당신이 맞이할 인생의 두 번째 봄입니다.", author: "작자 미상" },
            { text: "과거를 자랑스러워하고, 현재를 즐기며, 미래를 기대하십시오. 당신은 충분히 그럴 자격이 있습니다.", author: "작자 미상" },
            { text: "인생의 해질녘이 일출보다 아름다운 이유는, 하루 종일 품었던 따뜻한 온기를 머금고 있기 때문입니다.", author: "작자 미상" },
            { text: "어떤 길을 가더라도 당신의 발걸음에는 지혜가 묻어날 것입니다. 자신을 믿고 나아가세요.", author: "작자 미상" },
            { text: "가장 평범한 일상이 가장 위대한 행복임을 아는 나이, 지금이 바로 당신의 황금기입니다.", author: "작자 미상" },
            { text: "수많은 위기를 묵묵히 이겨낸 당신의 굳은살 배인 손을 존경합니다. 이제는 여유를 쥐어보세요.", author: "작자 미상" },
            { text: "당신의 존재 자체가 우리 가족의 가장 큰 축복이자 자랑입니다. 앞으로의 매일이 축제이길 바랍니다.", author: "가족 일동" }
        ];

        const itStocks = [
            { symbol: 'NASDAQ:NVDA', name: '엔비디아', keyword: '엔비디아' }, { symbol: 'NASDAQ:TSLA', name: '테슬라', keyword: '테슬라' },
            { symbol: 'NASDAQ:AAPL', name: '애플', keyword: '애플' }, { symbol: 'NASDAQ:MSFT', name: '마이크로소프트', keyword: '마이크로소프트' },
            { symbol: 'NASDAQ:GOOGL', name: '구글', keyword: '구글' }, { symbol: 'NASDAQ:AMZN', name: '아마존', keyword: '아마존' },
            { symbol: 'NASDAQ:META', name: '메타', keyword: '메타' }, { symbol: 'NYSE:TSM', name: 'TSMC', keyword: 'TSMC' },
            { symbol: 'NASDAQ:AVGO', name: '브로드컴', keyword: '브로드컴' }
        ];

        // 🌟 레이아웃 트랜스포머 스위치 🌟
        function switchTab(tabName) {
            currentTab = tabName;
            const layout = document.getElementById('main-dashboard-layout');
            const wrapper = document.getElementById('stock-list-wrapper');
            
            document.getElementById('tab-it').classList.toggle('active', tabName === 'it');
            document.getElementById('tab-trend').classList.toggle('active', tabName === 'trend');

            wrapper.innerHTML = '<div class="stock-list-container" id="stock-list"><div class="loading-text">⏳ 데이터를 불러오는 중입니다...</div></div>';

            setTimeout(() => {
                if (tabName === 'it') {
                    // IT 대장주 모드 (원상복구)
                    layout.classList.remove('trend-mode');
                    setupStockList(itStocks);
                    setActiveStock(itStocks[0]); 
                } else {
                    // 🔥 실시간 주도주 모드 (전체 확장) 🔥
                    layout.classList.add('trend-mode');
                    wrapper.innerHTML = '';
                    const widgetDiv = document.createElement('div');
                    widgetDiv.className = "trend-widget-container"; 
                    
                    const script = document.createElement('script');
                    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-hotlists.js";
                    script.async = true;
                    script.innerHTML = JSON.stringify({
                        "colorTheme": isDarkMode ? "dark" : "light", "dateRange": "12M", "exchange": "US", "showChart": true, "locale": "kr", "width": "100%", "height": "100%", "largeChartUrl": "", "isTransparent": true, "showSymbolLogo": true, "showFloatingTooltip": false
                    });
                    
                    widgetDiv.appendChild(script);
                    wrapper.appendChild(widgetDiv);
                }
            }, 50); 
        }

        // 도미노 로딩
        function setupStockList(stockArray) {
            const container = document.getElementById('stock-list');
            container.innerHTML = ''; 
            const themeStr = isDarkMode ? "dark" : "light";
            
            stockArray.forEach((stock, index) => {
                const item = document.createElement('div'); 
                item.className = 'stock-item'; 
                item.dataset.symbol = stock.symbol;
                
                if(currentActiveStock && stock.symbol === currentActiveStock.symbol) item.classList.add('active');
                
                const overlay = document.createElement('div'); 
                overlay.className = 'stock-item-overlay'; 
                overlay.onclick = () => { setActiveStock(stock); };
                
                const widgetDiv = document.createElement('div'); 
                widgetDiv.innerHTML = `<div style="padding:15px; text-align:center; color:#888; font-size:0.9em;">${stock.name} 대기 중...</div>`;
                
                item.appendChild(overlay); 
                item.appendChild(widgetDiv); 
                container.appendChild(item);

                setTimeout(() => {
                    widgetDiv.innerHTML = ''; 
                    const script = document.createElement('script');
                    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js"; 
                    script.async = true;
                    script.innerHTML = JSON.stringify({ 
                        "symbol": stock.symbol, "width": "100%", "isTransparent": true, "colorTheme": themeStr, "locale": "kr" 
                    });
                    widgetDiv.appendChild(script); 
                }, index * 50); 
            });
        }

        function setActiveStock(stockObj) {
            currentActiveStock = stockObj;
            document.querySelectorAll('.stock-item').forEach(item => { 
                item.classList.toggle('active', item.dataset.symbol === stockObj.symbol); 
            });
            document.getElementById('chart-main-title').innerText = `📊 ${stockObj.name} 실시간 차트`;
            
            document.getElementById('chart-container').innerHTML = '<div class="loading-text" style="padding-top: 100px;">📊 차트를 불러오는 중입니다... 잠시만 기다려주세요.</div>';
            
            setTimeout(() => { renderChart(stockObj.symbol); }, 50);
            fetchRealTimeNews(stockObj.keyword, 'company-news-list', 5);
        }

        function renderChart(symbol) {
            const container = document.getElementById('chart-container'); 
            container.innerHTML = ''; 
            new TradingView.widget({ "autosize": true, "symbol": symbol, "interval": "15", "timezone": "Asia/Seoul", "theme": isDarkMode ? "dark" : "light", "style": "1", "locale": "kr", "enable_publishing": false, "hide_top_toolbar": false, "hide_legend": false, "save_image": false, "container_id": "chart-container", "studies_overrides": { "volume.volume.color.0": "#0000ff", "volume.volume.color.1": "#ff0000" } });
        }

        function formatKoreanTime(pubDateStr) {
            let safeDateStr = pubDateStr;
            if (safeDateStr && !safeDateStr.includes('Z') && !safeDateStr.includes('+')) safeDateStr = safeDateStr.replace(' ', 'T') + 'Z';
            const dateObj = new Date(safeDateStr);
            const month = dateObj.getMonth() + 1;
            const date = dateObj.getDate();
            const hours = String(dateObj.getHours()).padStart(2, '0');
            const minutes = String(dateObj.getMinutes()).padStart(2, '0');
            return `${month}/${date} ${hours}:${minutes}`;
        }

        function fetchRealTimeNews(keyword, listElementId, displayCount) {
            const listEl = document.getElementById(listElementId);
            if(listElementId === 'company-news-list') document.getElementById('company-news-title').innerText = keyword ? `📰 ${keyword} 최근 관련 뉴스` : `📰 글로벌 경제 주요 뉴스`;
            listEl.innerHTML = '<li><div class="loading-text" style="padding: 10px;">뉴스를 가져오는 중입니다...</div></li>';
            
            // 🚨 뉴스 오류 해결: 캐시 버스터 삭제하여 API 제한 막음 🚨
            let rssUrl = keyword ? `https://news.google.com/rss/search?q=${encodeURIComponent(keyword + " 주식 OR 경제")}&hl=ko&gl=KR&ceid=KR:ko` : `https://news.google.com/rss/search?q=${encodeURIComponent('경제 OR 증시 OR 금융')}&hl=ko&gl=KR&ceid=KR:ko`;
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            fetch(apiUrl).then(res => res.json()).then(data => {
                if(data.status !== "ok") throw new Error("API 오류");
                const articles = data.items;
                if(!articles || articles.length === 0) { listEl.innerHTML = '<li>관련 뉴스가 없습니다.</li>'; return; }
                
                if(listElementId === 'global-news-list') {
                    allGlobalNews = articles; renderGlobalNewsList();
                    document.getElementById('ticker-text').innerHTML = `<span>${articles.slice(0, 10).map(a => `[속보] ${a.title}`).join(' <span> &nbsp; | &nbsp; </span> ')}</span>`;
                    document.getElementById('load-more-news-btn').style.display = articles.length > currentlyDisplayedGlobalNews ? 'block' : 'none';
                } else {
                    listEl.innerHTML = '';
                    articles.slice(0, displayCount).forEach(article => {
                        const li = document.createElement('li'); 
                        li.innerHTML = `<a href="${article.link}" target="_blank">► ${article.title} <span style="font-size:0.8em; color:#888; margin-left:10px;">(${formatKoreanTime(article.pubDate)})</span></a>`;
                        listEl.appendChild(li);
                    });
                }
            }).catch(() => { listEl.innerHTML = '<li>뉴스 로딩에 실패했습니다. 화면 우측 하단의 새로고침(🔄)을 눌러주세요.</li>'; });
        }

        function renderGlobalNewsList() {
            const newsList = document.getElementById('global-news-list'); 
            newsList.innerHTML = '';
            allGlobalNews.slice(0, currentlyDisplayedGlobalNews).forEach(article => {
                const li = document.createElement('li'); 
                li.innerHTML = `<a href="${article.link}" target="_blank">► ${article.title} <span style="font-size:0.8em; color:#888; margin-left:10px;">(${formatKoreanTime(article.pubDate)})</span></a>`;
                newsList.appendChild(li);
            });
        }

        function loadMoreNews() { 
            currentlyDisplayedGlobalNews += 10; 
            renderGlobalNewsList(); 
            if(currentlyDisplayedGlobalNews >= allGlobalNews.length) document.getElementById('load-more-news-btn').style.display = 'none'; 
        }

        function renderExchangeWidget() {
            const container = document.getElementById('exchange-container');
            container.innerHTML = '<h4 style="margin: 0 0 10px 0;">💱 실시간 환율</h4>';
            const script = document.createElement('script'); script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js"; script.async = true;
            script.innerHTML = JSON.stringify({ "symbol": "FX_IDC:USDKRW", "width": "100%", "isTransparent": true, "colorTheme": isDarkMode ? "dark" : "light", "locale": "kr" });
            container.appendChild(script);
        }

        function toggleTheme() { isDarkMode = !isDarkMode; document.body.classList.toggle('dark-mode', isDarkMode); document.getElementById('theme-btn').innerText = isDarkMode ? "☀️" : "🌙"; switchTab(currentTab); renderExchangeWidget(); }
        
        function refreshAll() { fetchRealTimeNews(null, 'global-news-list', null); if(currentTab === 'it') { fetchRealTimeNews(currentActiveStock.keyword, 'company-news-list', 5); setupStockList(itStocks); renderChart(currentActiveStock.symbol); } else { switchTab('trend'); } renderExchangeWidget(); }

        function displayDailyQuote() {
            const today = new Date(); const year = today.getFullYear();
            const todayStr = `${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            const quoteCard = document.getElementById('quote-card-container'); const textEl = document.getElementById('daily-quote-text'); const authorEl = document.getElementById('daily-quote-author');

            if (lunarBirthdayToSolar[year] === todayStr) {
                quoteCard.classList.add('birthday-mode'); textEl.innerHTML = "🎉 아빠 생신 축하해요!! 즐겁고 멋진 하루 보내세요 ♥ 🎉"; textEl.style.fontWeight = "bold"; textEl.style.fontSize = "1.6em"; authorEl.innerText = "- 사랑하는 딸 올림 -";
                startHeartAnimation(); return; 
            }
            const selectedQuote = fatherQuotes[(today.getDate() - 1) % fatherQuotes.length];
            quoteCard.classList.remove('birthday-mode'); textEl.style.fontWeight = "normal"; textEl.style.fontSize = "1.3em"; textEl.innerText = `"${selectedQuote.text}"`; authorEl.innerText = `- ${selectedQuote.author} -`;
        }

        document.getElementById('toggle-exchange-btn').addEventListener('click', () => {
            isExchangeVisible = !isExchangeVisible; document.getElementById('exchange-container').classList.toggle('hidden'); document.getElementById('toggle-exchange-btn').innerText = isExchangeVisible ? "💱 환율창 숨기기" : "💱 환율창 열기";
        });

        document.addEventListener("DOMContentLoaded", () => {
            updateTime();
            setInterval(updateTime, 1000);
            displayDailyQuote(); 
            
            setTimeout(() => {
                renderExchangeWidget();
                fetchRealTimeNews(null, 'global-news-list', null);
            }, 100);

            setTimeout(() => {
                switchTab('it'); 
            }, 300);
        });

    </script>
</body>
</html>
