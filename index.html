<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 IT & 경제 실시간 대시보드</title>
    <style>
        /* 테마 변수 설정 */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333333;
            --card-bg: #ffffff;
            --border-color: #dddddd;
            --accent-color: #e74c3c;
        }
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f4f7f6;
            --card-bg: #1e1e1e;
            --border-color: #333333;
        }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 뉴스 전광판 */
        .news-ticker {
            background-color: var(--card-bg);
            padding: 10px 0;
            border-bottom: 2px solid var(--border-color);
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 40s linear infinite;
            font-weight: bold;
        }
        .ticker-content span {
            margin-right: 50px;
        }
        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* 레이아웃 */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        #current-time { font-size: 0.9em; color: #888; }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        /* 주식 버튼 영역 */
        .stock-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .stock-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .stock-btn:hover, .stock-btn.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        /* 전체보기 토글 버튼 스타일 */
        #toggle-stocks-btn {
            background-color: transparent;
            border: 1px dashed #888;
            color: #888;
            margin-top: 10px;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        #toggle-stocks-btn:hover { background-color: rgba(0,0,0,0.05); color: var(--text-color); }

        #chart-container { height: 500px; width: 100%; }

        /* 하단 뉴스 리스트 */
        #news-list { list-style: none; padding: 0; margin: 0; }
        #news-list li { padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        #news-list a { text-decoration: none; color: var(--text-color); font-size: 1.1em; }
        #news-list a:hover { color: var(--accent-color); }

        /* 플로팅 UI */
        .floating-exchange {
            position: fixed; right: 20px; top: 80px; width: 250px;
            background: var(--card-bg); padding: 10px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000;
            border: 1px solid var(--border-color);
        }
        @media (max-width: 1000px) { .floating-exchange { display: none; } }

        .floating-controls {
            position: fixed; right: 20px; bottom: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .action-btn {
            background-color: var(--text-color); color: var(--bg-color);
            border: none; padding: 15px; border-radius: 50%;
            cursor: pointer; font-size: 1.2em; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="news-ticker">
        <div class="ticker-content" id="ticker-text">
            <span>최신 경제 뉴스를 불러오는 중입니다...</span>
        </div>
    </div>

    <div class="floating-exchange" id="exchange-container"></div>

    <div class="container">
        <div class="header">
            <h1>🌐 글로벌 IT 대장주 & 경제 대시보드</h1>
            <p id="current-time">대한민국 표준시 로딩 중...</p>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">📊 실시간 주가 변동 차트</h2>
            <div class="stock-tabs" id="stock-tabs"></div>
            
            <div style="text-align: center; margin-bottom: 20px;">
                <button id="toggle-stocks-btn">➕ 주식 정보 전체보기</button>
            </div>
            
            <div id="chart-container"></div>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">📰 최신 경제 뉴스 타임라인 (Google 경제)</h2>
            <ul id="news-list">
                <li>뉴스를 불러오는 중입니다...</li>
            </ul>
        </div>
    </div>

    <div class="floating-controls">
        <button class="action-btn" id="theme-btn" title="다크 모드 전환">🌙</button>
        <button class="action-btn" id="refresh-btn" title="데이터 새로고침">🔄</button>
    </div>

    <script>
        let isDarkMode = false;
        let currentSymbol = 'NASDAQ:NVDA';
        let showAllStocks = false;

        // 전체 주식 리스트 (확장됨)
        const allStocks = [
            { name: '1. 엔비디아', symbol: 'NASDAQ:NVDA' },
            { name: '2. 테슬라', symbol: 'NASDAQ:TSLA' },
            { name: '3. SK하이닉스', symbol: 'KRX:000660' },
            { name: '4. 팔란티어', symbol: 'NASDAQ:PLTR' }, // 나스닥으로 수정됨!
            { name: '5. 로켓랩', symbol: 'NASDAQ:RKLB' },
            { name: '애플', symbol: 'NASDAQ:AAPL' },
            { name: '마이크로소프트', symbol: 'NASDAQ:MSFT' },
            { name: '구글 (Alphabet)', symbol: 'NASDAQ:GOOGL' },
            { name: '메타 (Meta)', symbol: 'NASDAQ:META' },
            { name: 'AMD', symbol: 'NASDAQ:AMD' },
            { name: '삼성전자', symbol: 'KRX:005930' }
        ];

        // 시계 설정
        function updateTime() {
            const now = new Date();
            const options = { timeZone: 'Asia/Seoul', year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('current-time').innerText = "기준: " + now.toLocaleString('ko-KR', options);
        }
        setInterval(updateTime, 1000); updateTime();

        // 버튼 렌더링 (펼치기/접기 로직 적용)
        function setupStockButtons() {
            const tabsContainer = document.getElementById('stock-tabs');
            tabsContainer.innerHTML = '';
            
            // showAllStocks가 true면 전체 표시, false면 처음 5개만 표시
            const displayStocks = showAllStocks ? allStocks : allStocks.slice(0, 5);
            
            displayStocks.forEach(stock => {
                const btn = document.createElement('button');
                btn.className = 'stock-btn' + (stock.symbol === currentSymbol ? ' active' : '');
                btn.innerText = stock.name;
                btn.onclick = () => {
                    currentSymbol = stock.symbol;
                    setupStockButtons();
                    renderChart(currentSymbol);
                };
                tabsContainer.appendChild(btn);
            });
        }

        // 전체보기 토글 버튼 이벤트
        document.getElementById('toggle-stocks-btn').addEventListener('click', (e) => {
            showAllStocks = !showAllStocks;
            e.target.innerText = showAllStocks ? "➖ 주식 정보 접기" : "➕ 주식 정보 전체보기";
            setupStockButtons(); // 버튼 목록 다시 그리기
        });

        // 차트 렌더링
        function renderChart(symbol) {
            const container = document.getElementById('chart-container');
            container.innerHTML = ''; 
            const themeStr = isDarkMode ? "dark" : "light";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
            script.async = true;
            script.innerHTML = JSON.stringify({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Asia/Seoul",
                "theme": themeStr,
                "style": "1",
                "locale": "kr",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "studies_overrides": {
                    "volume.volume.color.0": "#0000ff",
                    "volume.volume.color.1": "#ff0000"
                }
            });
            container.appendChild(script);
        }

        // 환율 위젯
        function renderExchangeWidget() {
            const container = document.getElementById('exchange-container');
            container.innerHTML = '<h4 style="margin: 0 0 10px 0;">💱 실시간 환율</h4>';
            const themeStr = isDarkMode ? "dark" : "light";
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
            script.async = true;
            script.innerHTML = JSON.stringify({
                "symbol": "FX_IDC:USDKRW",
                "width": "100%",
                "isTransparent": true,
                "colorTheme": themeStr,
                "locale": "kr"
            });
            container.appendChild(script);
        }

        // 구글 경제 뉴스 RSS 로딩
        function loadNews() {
            // 구글 한국 뉴스 (경제 섹션) RSS
            const rssUrl = 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=ko&gl=KR&ceid=KR:ko';
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if(data.status !== "ok") throw new Error("API 응답 오류");
                    
                    const articles = data.items.slice(0, 10);
                    
                    // 전광판 세팅
                    const tickerText = articles.map(a => `[속보] ${a.title}`).join(' <span> | </span> ');
                    document.getElementById('ticker-text').innerHTML = `<span>${tickerText}</span>`;

                    // 리스트 세팅
                    const newsList = document.getElementById('news-list');
                    newsList.innerHTML = '';
                    articles.forEach(article => {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="${article.link}" target="_blank">► ${article.title}</a>`;
                        newsList.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error('뉴스 로딩 실패:', error);
                    document.getElementById('ticker-text').innerHTML = '<span>최신 뉴스를 불러오지 못했습니다. 잠시 후 새로고침을 눌러주세요.</span>';
                    document.getElementById('news-list').innerHTML = '<li>뉴스를 가져오는데 실패했습니다.</li>';
                });
        }

        // 이벤트 리스너
        document.getElementById('theme-btn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('theme-btn').innerText = isDarkMode ? "☀️" : "🌙";
            renderChart(currentSymbol);
            renderExchangeWidget();
        });

        document.getElementById('refresh-btn').addEventListener('click', () => {
            loadNews();
            renderChart(currentSymbol);
            renderExchangeWidget();
        });

        // 초기 실행
        setupStockButtons();
        renderChart(currentSymbol);
        renderExchangeWidget();
        loadNews();

    </script>
</body>
</html>
